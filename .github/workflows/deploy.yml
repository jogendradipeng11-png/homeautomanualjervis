name: Deploy Protected Smart Home Hub

on:
  push:
    branches:
      - main  # 💡 Change this line to master if your default branch is master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      - name: Inject Secret Token Keys Safely
        run: |
          # Robust string injection fallback using safe delimiters
          sed -i 's|REPLACE_WITH_API_KEY|${{ secrets.GEMINI_API_KEY }}|g' index.html

      - name: Deploy Secure Site to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .        # Deploys your root directory layout
          branch: gh-pages  # Automates builds straight onto your deployment server branch
