<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home - Multi Room Control</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpq3OMuZetPXgrA3jPb-EacSyJ7hSHGRk",
            authDomain: "homeiotautomanual.firebaseapp.com",
            databaseURL: "https://homeiotautomanual-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "homeiotautomanual",
            storageBucket: "homeiotautomanual.firebasestorage.app",
            messagingSenderId: "672272679550",
            appId: "1:672272679550:web:c94f92fb49f1b7548cce2f",
            measurementId: "G-CTW18729N9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let currentUser = null;
        let userDevicesList = []; 

        window.activeRoom = null;
        window.activeDevice = null;

        // Auth State Tracking
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-name').textContent = user.email.split('@')[0];
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('jarvis-bar-container').style.display = 'flex';
                loadUserDevices();
            } else {
                currentUser = null;
                userDevicesList = [];
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('app-container').style.display = 'none';
                document.getElementById('jarvis-bar-container').style.display = 'none';
            }
        });

        // Login & Signup Management
        window.login = async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) return showMessage('login-error', 'Please fill in all fields.');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (e) {
                showMessage('login-error', e.message);
            }
        };

        window.signup = async () => {
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm-password').value;
            if (!email || !pass || !confirm) return showMessage('signup-error', 'All fields are required.');
            if (pass !== confirm) return showMessage('signup-error', 'Passwords do not match!');
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, 'users/' + cred.user.uid), { email });
            } catch (e) {
                showMessage('signup-error', e.message);
            }
        };

        window.logout = () => signOut(auth);
        window.showLogin = () => { document.getElementById('login-form').style.display = 'block'; document.getElementById('signup-form').style.display = 'none'; };
        window.showSignup = () => { document.getElementById('login-form').style.display = 'none'; document.getElementById('signup-form').style.display = 'block'; };

        function showMessage(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // Load User Devices from Database
        function loadUserDevices() {
            const devicesRef = ref(db, `users/${currentUser.uid}/devices`);
            onValue(devicesRef, (snapshot) => {
                const data = snapshot.val();
                userDevicesList = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                renderDeviceList(userDevicesList);
            });
        }

        function renderDeviceList(devices) {
            const container = document.getElementById('device-list');
            container.innerHTML = '';
            if (devices.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;font-size:1.2em;grid-column:1/-1;">No devices added yet. Click + to add one!</p>';
                return;
            }
            devices.forEach(dev => {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-header">
                        <h3>${dev.roomId} → ${dev.deviceId}</h3>
                        <div class="online-indicator" id="status-${dev.roomId}-${dev.deviceId}"></div>
                    </div>
                    <button class="btn-control" onclick="selectDevice('${dev.roomId}', '${dev.deviceId}')">Open Controls</button>
                    <button class="btn-remove" onclick="removeDevice('${dev.id}')">Remove</button>
                `;
                container.appendChild(card);

                const statusRef = ref(db, `rooms/${dev.roomId}/devices/${dev.deviceId}/online`);
                onValue(statusRef, (snap) => {
                    const indicator = document.getElementById(`status-${dev.roomId}-${dev.deviceId}`);
                    if (indicator) {
                        indicator.className = snap.val() === true ? 'online-indicator online' : 'online-indicator offline';
                    }
                });
            });
        }

        window.selectDevice = (room, device) => {
            window.activeRoom = room;
            window.activeDevice = device;
            document.getElementById('control-title').textContent = `${room} / ${device}`;
            document.getElementById('control-panel').style.display = 'block';
            document.getElementById('device-list').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';
            
            const stateRef = ref(db, `rooms/${room}/devices/${device}/states`);
            onValue(stateRef, (snap) => {
                const s = snap.val() || {};
                [1,2,3,4].forEach(i => updateBulb(i, !!s[`bulb${i}`]));
                updateFan(s.fanSpeed ?? 0);
            });
        };

        window.goBack = () => {
            document.getElementById('control-panel').style.display = 'none';
            document.getElementById('device-list').style.display = 'grid';
            document.getElementById('back-btn').style.display = 'none';
            window.activeRoom = null;
            window.activeDevice = null;
        };

        window.toggleBulb = (n) => {
            if (!window.activeRoom) return alert("Select a device first");
            const current = document.getElementById(`bulb${n}-status`).textContent === "ON";
            set(ref(db, `rooms/${window.activeRoom}/devices/${window.activeDevice}/states/bulb${n}`), !current);
        };

        window.setFanSpeed = (speed) => {
            if (!window.activeRoom) return alert("Select a device first");
            set(ref(db, `rooms/${window.activeRoom}/devices/${window.activeDevice}/states/fanSpeed`), speed);
        };

        function updateBulb(n, state) {
            const el = document.getElementById(`bulb${n}-status`);
            if (!el) return;
            const card = el.parentElement;
            el.textContent = state ? "ON" : "OFF";
            card.classList.toggle('active', state);
        }

        function updateFan(speed) {
            const statusEl = document.getElementById('fan-status');
            if (statusEl) {
                statusEl.textContent = `Current: ${['OFF','LOW','MEDIUM','HIGH'][speed]}`;
            }
            document.querySelectorAll('.speed-btn').forEach((btn, i) => btn.classList.toggle('active', i === speed));
        }

        document.getElementById('add-device-btn').onclick = () => { document.getElementById('modal').style.display = 'flex'; };
        document.getElementById('close-modal').onclick = () => { document.getElementById('modal').style.display = 'none'; };

        window.addDevice = () => {
            const room = document.getElementById('room-id').value.trim();
            const device = document.getElementById('device-id').value.trim();
            if (!room || !device) return alert("Please enter both Room ID and Device ID");
            
            push(ref(db, `users/${currentUser.uid}/devices`), { roomId: room, deviceId: device });
            document.getElementById('room-id').value = '';
            document.getElementById('device-id').value = '';
            document.getElementById('modal').style.display = 'none';
        };

        window.removeDevice = (id) => {
            if (confirm("Remove this device from your list?")) {
                remove(ref(db, `users/${currentUser.uid}/devices/${id}`));
            }
        };

        window.onclick = (e) => {
            const modal = document.getElementById('modal');
            if (e.target === modal) modal.style.display = 'none';
        };

        // ====================== HYBRID SMART JARVIS PROCESSING LOOP ======================
        async function processWithNvidiaAI(text) {
            if (userDevicesList.length === 0) return null;

            const currentDeviceContext = JSON.stringify(userDevicesList.map(d => ({ roomId: d.roomId, deviceId: d.deviceId })));
            const prompt = `You are Jarvis, a smart home automation assistant.
Hardware List: ${currentDeviceContext}
User command: "${text}"

Rules:
1. Identify target room and device. If same name (like chintubedroom), match both.
2. Actions: "bulb1"-"bulb4" (true/false) or "fanSpeed" (0-3).
Return ONLY clean raw minified JSON. Do not include markdown codeblocks or quotes:
{"commands": [{"room": "chintubedroom", "device": "chintubedroom", "action": "bulb1", "value": true}]}`;

            try {
                const response = await fetch('https://integrate.api.nvidia.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer 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' 
                    },
                    body: JSON.stringify({
                        model: "meta/llama3-70b-instruct", 
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.1,
                        max_tokens: 200
                    })
                });
                
                const data = await response.json();
                if (!data.choices?.[0]?.message?.content) return null;

                let txt = data.choices[0].message.content.trim();
                const firstBracket = txt.indexOf('{');
                const lastBracket = txt.lastIndexOf('}');
                if (firstBracket === -1 || lastBracket === -1) return null;
                
                return JSON.parse(txt.substring(firstBracket, lastBracket + 1));
            } catch(e) {
                return null; // Gracefully route down to local system regex engine
            }
        }

        // LOCAL AUTONOMOUS PARSER: Works instantaneously without needing any active web keys!
        function processWithLocalFallback(text) {
            const norm = text.toLowerCase().trim();
            let action = "bulb1";
            let value = norm.includes("on") || norm.includes("start") || norm.includes("activate");
            
            if (norm.includes("bulb 1") || norm.includes("bulb1") || norm.includes("light 1")) action = "bulb1";
            else if (norm.includes("bulb 2") || norm.includes("bulb2") || norm.includes("light 2")) action = "bulb2";
            else if (norm.includes("bulb 3") || norm.includes("bulb3") || norm.includes("light 3")) action = "bulb3";
            else if (norm.includes("bulb 4") || norm.includes("bulb4") || norm.includes("light 4")) action = "bulb4";
            else if (norm.includes("fan")) {
                action = "fanSpeed";
                if (norm.includes("off") || norm.includes("stop")) value = 0;
                else if (norm.includes("low") || norm.includes("speed 1")) value = 1;
                else if (norm.includes("medium") || norm.includes("med") || norm.includes("speed 2")) value = 2;
                else if (norm.includes("high") || norm.includes("speed 3")) value = 3;
                else value = 1;
            }

            // Target search matching
            let targetDevice = userDevicesList[0]; 
            for (let dev of userDevicesList) {
                if (norm.includes(dev.roomId.toLowerCase()) || norm.includes(dev.deviceId.toLowerCase())) {
                    targetDevice = dev;
                    break;
                }
            }

            if (!targetDevice) return null;

            return {
                "commands": [{ "room": targetDevice.roomId, "device": targetDevice.deviceId, "action": action, "value": value }]
            };
        }

        window.sendJarvisCommand = async () => {
            const input = document.getElementById('jarvis-input');
            const text = input.value.trim();
            if(!text) return;
            
            input.disabled = true;
            input.placeholder = "Jarvis processing instruction fields...";

            try {
                let result = await processWithNvidiaAI(text);
                
                if (!result) {
                    result = processWithLocalFallback(text);
                }
                
                if(result?.commands && result.commands.length > 0) {
                    result.commands.forEach(cmd => {
                        const matchedDevice = userDevicesList.find(d => 
                            d.roomId.toLowerCase().trim() === cmd.room.toLowerCase().trim() && 
                            d.deviceId.toLowerCase().trim() === cmd.device.toLowerCase().trim()
                        );

                        // If explicit room lookup returns empty, direct switch onto the user's primary active profile index item card
                        const target = matchedDevice || userDevicesList[0];
                        if (!target) return;

                        if(cmd.action.startsWith('bulb')) {
                            const num = cmd.action.replace('bulb','');
                            set(ref(db, `rooms/${target.roomId}/devices/${target.deviceId}/states/bulb${num}`), !!cmd.value);
                        } else if(cmd.action === 'fanSpeed') {
                            set(ref(db, `rooms/${target.roomId}/devices/${target.deviceId}/states/fanSpeed`), parseInt(cmd.value, 10) || 0);
                        }
                    });
                    input.value = '';
                } else {
                    alert("Jarvis could not match that item configuration layout phrase context. Try adding a device target first.");
                }
            } catch (err) {
                console.error(err);
            } finally {
                // Crucial Reset Core fix: This line runs no matter what to prevent input lockouts!
                input.disabled = false;
                input.placeholder = "Talk to Jarvis... e.g. Turn on bulb 1 in chintubedroom";
                input.focus();
            }
        };

        window.startVoiceInput = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("Web Speech platform drivers not accessible.");
            
            const recog = new SpeechRecognition();
            recog.lang = 'en-US';
            
            const micBtn = document.querySelector(".jarvis-bar button[title='Voice Input']");
            
            recog.onstart = () => {
                micBtn.style.background = "#e74c3c"; 
                document.getElementById('jarvis-input').placeholder = "Listening... speak now.";
            };

            recog.onerror = () => { resetMicUI(); };
            recog.onend = () => { resetMicUI(); };

            recog.onresult = e => {
                document.getElementById('jarvis-input').value = e.results[0][0].transcript;
                sendJarvisCommand();
            };

            function resetMicUI() {
                micBtn.style.background = "linear-gradient(135deg,#667eea,#764ba2)";
                document.getElementById('jarvis-input').placeholder = "Talk to Jarvis... e.g. Turn on bulb 1 in chintubedroom";
            }

            recog.start();
        };
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; padding-bottom: 120px; }
        .container { width:100%; max-width:1200px; }
        .auth-container { background:white; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.15); overflow:hidden; max-width:400px; margin:0 auto; }
        .header { background:linear-gradient(135deg,#2c3e50,#34495e); color:white; padding:40px 30px; text-align:center; }
        .header h1 { font-size:2.2em; margin-bottom:8px; }
        .form-container { padding:30px; }
        .form-group { margin-bottom:20px; }
        .form-group input { width:100%; padding:14px; border:2px solid #e9ecef; border-radius:12px; font-size:16px; }
        .btn { width:100%; padding:14px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:12px; font-size:16px; cursor:pointer; }
        .switch-form { margin-top: 15px; text-align: center; font-size: 0.95em; }
        .switch-form a { color:#667eea; cursor:pointer; text-decoration:underline; }
        .error-message { background:#f8d7da; color:#721c24; padding:12px; border-radius:8px; margin-bottom:15px; text-align:center; display:none; }
        .app-container { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; }
        .app-header { background:linear-gradient(135deg,#2c3e50,#34495e); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; }
        .logout-btn { background:#e74c3c; padding:10px 20px; border:none; border-radius:8px; color:white; cursor:pointer; font-weight: bold; }
        .controls { padding:30px; }
        #add-device-btn { width:auto; padding:14px 30px; display:inline-block; margin-bottom:20px; }
        #device-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; margin-top:20px; }
        .room-card { background:#f8f9fa; border-radius:15px; padding:25px; text-align:center; box-shadow:0 8px 25px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        .room-header { margin-bottom:15px; display: flex; justify-content: space-between; align-items: center; }
        .room-header h3 { color:#2c3e50; font-size:1.2em; }
        .online-indicator { width:16px; height:16px; border-radius:50%; background:#e74c3c; }
        .online-indicator.online { background:#2ecc71; box-shadow:0 0 10px #2ecc71; }
        .btn-control { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:12px 30px; border:none; border-radius:12px; cursor:pointer; width:100%; margin:10px 0; font-weight: bold; }
        .btn-remove { background:none; color:#e74c3c; padding:8px 16px; border:1px solid #e74c3c; border-radius:8px; cursor:pointer; font-size:13px; }
        #back-btn { background:#6c757d; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; margin-bottom:20px; display:none; font-weight: bold; }
        #control-panel { display:none; background:#f8f9fa; padding:30px; border-radius:15px; border: 1px solid #e9ecef; }
        #control-title { text-align:center; color:#2c3e50; font-size:1.9em; margin-bottom:20px; }
        .bulbs-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:20px; margin:30px 0; }
        .bulb-card { background:white; border-radius:15px; padding:20px; text-align:center; cursor:pointer; border:2px solid #e9ecef; }
        .bulb-card.active { background:linear-gradient(135deg,#ffd89b,#19547b); color:white; border-color:#ffd89b; }
        .bulb-icon { font-size:2em; margin-bottom:10px; }
        .status { font-weight:bold; font-size:1.2em; margin-top: 5px; }
        .fan-control { background:white; border-radius:15px; padding:30px; text-align:center; margin-top:20px; border: 1px solid #e9ecef; }
        .speed-buttons { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin:20px 0; }
        .speed-btn { padding:14px 32px; border:none; border-radius:30px; background:#e9ecef; color:#495057; font-weight:bold; cursor:pointer; }
        .speed-btn.active { background:linear-gradient(135deg,#667eea,#764ba2); color:white; transform:scale(1.05); }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:2000; }
        .modal-content { background:white; padding:35px; border-radius:15px; width:90%; max-width:420px; text-align:center; }
        
        .jarvis-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 62, 80, 0.98);
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            width: 90%;
            max-width: 700px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .jarvis-bar input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            background: #1a252f;
            color: white;
            font-size: 1.05rem;
        }
        .jarvis-bar input:focus { outline: none; }
        .jarvis-bar button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- AUTHENTICATION -->
    <div class="auth-container" id="auth-container">
        <div class="header">
            <h1>Smart Home</h1>
            <p>Multi-Room Control Hub</p>
        </div>
        <div class="form-container" id="login-form">
            <div class="error-message" id="login-error"></div>
            <div class="form-group"><input type="email" id="login-email" placeholder="Email Address"></div>
            <div class="form-group"><input type="password" id="login-password" placeholder="Password"></div>
            <button class="btn" onclick="login()">Login</button>
            <div class="switch-form"><p>Need an account? <a onclick="showSignup()">Sign up</a></p></div>
        </div>
        <div class="form-container" id="signup-form" style="display:none;">
            <div class="error-message" id="signup-error"></div>
            <div class="form-group"><input type="email" id="signup-email" placeholder="Email Address"></div>
            <div class="form-group"><input type="password" id="signup-password" placeholder="Password"></div>
            <div class="form-group"><input type="password" id="signup-confirm-password" placeholder="Confirm Password"></div>
            <button class="btn" onclick="signup()">Create Account</button>
            <div class="switch-form"><p>Already registered? <a onclick="showLogin()">Login</a></p></div>
        </div>
    </div>

    <!-- UTILITY CONTROL SYSTEM -->
    <div class="app-container" id="app-container" style="display:none;">
        <div class="app-header">
            <div><h1>Smart Home Control</h1><p>Welcome back, <span id="user-name" style="font-weight: bold; color: #ffd89b;"></span></p></div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="controls">
            <button class="btn" id="add-device-btn">+ Add Room & Device Target</button>
            <button id="back-btn" onclick="goBack()">← Back to Device List</button>
            <div id="device-list"></div>
            
            <div id="control-panel">
                <h2 id="control-title">Select a device</h2>
                <div class="bulbs-grid">
                    <div class="bulb-card" onclick="toggleBulb(1)"><div class="bulb-icon">💡</div><h3>Bulb 1</h3><div class="status" id="bulb1-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(2)"><div class="bulb-icon">💡</div><h3>Bulb 2</h3><div class="status" id="bulb2-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(3)"><div class="bulb-icon">💡</div><h3>Bulb 3</h3><div class="status" id="bulb3-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(4)"><div class="bulb-icon">💡</div><h3>Bulb 4</h3><div class="status" id="bulb4-status">OFF</div></div>
                </div>
                <div class="fan-control">
                    <h3>Fan Speed Regulator</h3>
                    <div class="speed-buttons">
                        <button class="speed-btn" onclick="setFanSpeed(0)">OFF</button>
                        <button class="speed-btn" onclick="setFanSpeed(1)">LOW</button>
                        <button class="speed-btn" onclick="setFanSpeed(2)">MED</button>
                        <button class="speed-btn" onclick="setFanSpeed(3)">HIGH</button>
                    </div>
                    <div class="status" id="fan-status">Current: OFF</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Dialog -->
<div id="modal">
    <div class="modal-content">
        <h2>Add New Smart Node</h2>
        <div class="form-group"><input type="text" id="room-id" placeholder="Room ID (e.g., chintubedroom)"></div>
        <div class="form-group"><input type="text" id="device-id" placeholder="Device Node ID (e.g., chintubedroom)"></div>
        <button class="btn" onclick="addDevice()">Save and Connect</button>
        <button class="btn" style="background:#6c757d; margin-top:10px;" id="close-modal">Cancel</button>
    </div>
</div>

<!-- Jarvis Interface Bar -->
