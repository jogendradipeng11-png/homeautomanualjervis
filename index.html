<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home - Global Jarvis Core</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpq3OMuZetPXgrA3jPb-EacSyJ7hSHGRk",
            authDomain: "homeiotautomanual.firebaseapp.com",
            databaseURL: "https://homeiotautomanual-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "homeiotautomanual",
            storageBucket: "homeiotautomanual.firebasestorage.app",
            messagingSenderId: "672272679550",
            appId: "1:672272679550:web:c94f92fb49f1b7548cce2f",
            measurementId: "G-CTW18729N9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let currentUser = null;
        let userDevicesList = []; 
        let GLOBAL_SYSTEM_AI_KEY = ""; 
        let recognition = null;
        let isAlwaysListening = false;

        const ADMIN_EMAIL = "jogendra.dipeng11@gmail.com"; 
        const ADMIN_UID_PATH = "master_admin_global_core";

        // 🌐 TARGET RENDER BACKEND ROUTING ENDPOINT
        const RENDER_BACKEND_URL = "https://jarvis-routing-backend.onrender.com/api/chat";

        window.activeRoom = null;
        window.activeDevice = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-name').textContent = user.email.split('@')[0];
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('jarvis-wizard-container').style.display = 'block';
                
                const keyRef = ref(db, `global_config/${ADMIN_UID_PATH}/key`);
                onValue(keyRef, (snapshot) => {
                    const cloudKey = snapshot.val();
                    if (cloudKey) {
                        GLOBAL_SYSTEM_AI_KEY = cloudKey;
                        document.getElementById('dashboard-gemini-key').value = "••••••••••••••••••••••••••••••••";
                        document.getElementById('dashboard-gemini-key').disabled = true;
                        document.getElementById('sync-key-btn').style.display = 'none';
                        document.getElementById('unlock-key-btn').style.display = 'inline-block';
                    } else {
                        document.getElementById('dashboard-gemini-key').value = "";
                        document.getElementById('dashboard-gemini-key').disabled = false;
                        document.getElementById('sync-key-btn').style.display = 'inline-block';
                        document.getElementById('unlock-key-btn').style.display = 'none';
                    }
                });

                loadUserDevices();
            } else {
                currentUser = null;
                userDevicesList = [];
                GLOBAL_SYSTEM_AI_KEY = "";
                isAlwaysListening = false;
                if(recognition) { recognition.abort(); }
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('app-container').style.display = 'none';
                document.getElementById('jarvis-wizard-container').style.display = 'none';
            }
        });

        window.unlockKeyField = async () => {
            if (!currentUser || currentUser.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
                alert("CRITICAL SECURITY VIOLATION, Sir.");
                return;
            }
            const verificationPassword = prompt("MASTER SECURITY CHALLENGE:");
            if (!verificationPassword) return;
            const credential = EmailAuthProvider.credential(currentUser.email, verificationPassword);
            try {
                await reauthenticateWithCredential(auth.currentUser, credential);
                document.getElementById('dashboard-gemini-key').disabled = false;
                document.getElementById('dashboard-gemini-key').value = GLOBAL_SYSTEM_AI_KEY; 
                document.getElementById('dashboard-gemini-key').focus();
                document.getElementById('sync-key-btn').style.display = 'inline-block';
                document.getElementById('unlock-key-btn').style.display = 'none';
            } catch (err) { alert("ACCESS DENIED."); }
        };

        window.saveSystemKey = async () => {
            if (!currentUser || currentUser.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) return;
            const keyVal = document.getElementById('dashboard-gemini-key').value.trim();
            if(!keyVal || keyVal.includes("•••")) return;
            try {
                await set(ref(db, `global_config/${ADMIN_UID_PATH}`), { key: keyVal });
                alert("Core Key Synced!");
            } catch (e) {}
        };

        window.login = async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) return showMessage('login-error', 'Fill fields.');
            try { await signInWithEmailAndPassword(auth, email, password); } catch (e) { showMessage('login-error', e.message); }
        };

        window.signup = async () => {
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm-password').value;
            if (!email || !pass || !confirm) return showMessage('signup-error', 'Required fields missing.');
            if (pass !== confirm) return showMessage('signup-error', 'Passwords mismatch.');
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, 'users/' + cred.user.uid), { email });
            } catch (e) { showMessage('signup-error', e.message); }
        };

        window.logout = () => signOut(auth);
        window.showLogin = () => { document.getElementById('login-form').style.display = 'block'; document.getElementById('signup-form').style.display = 'none'; };
        window.showSignup = () => { document.getElementById('login-form').style.display = 'none'; document.getElementById('signup-form').style.display = 'block'; };

        function showMessage(id, msg) {
            const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function loadUserDevices() {
            onValue(ref(db, `users/${currentUser.uid}/devices`), (snapshot) => {
                const data = snapshot.val();
                userDevicesList = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                renderDeviceList(userDevicesList);
            });
        }

        function renderDeviceList(devices) {
            const container = document.getElementById('device-list'); container.innerHTML = '';
            if (devices.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;">No devices targets added.</p>';
                return;
            }
            devices.forEach(dev => {
                const card = document.createElement('div'); card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-header"><h3>${dev.roomId}</h3><div class="online-indicator" id="status-${dev.roomId}-${dev.deviceId}"></div></div>
                    <button type="button" class="btn-control" onclick="selectDevice('${dev.roomId}', '${dev.deviceId}')">Controls</button>
                `;
                container.appendChild(card);
                onValue(ref(db, `rooms/${dev.roomId}/devices/${dev.deviceId}/online`), (snap) => {
                    const ind = document.getElementById(`status-${dev.roomId}-${dev.deviceId}`);
                    if (ind) ind.className = snap.val() === true ? 'online-indicator online' : 'online-indicator offline';
                });
            });
        }

        window.selectDevice = (room, device) => {
            window.activeRoom = room; window.activeDevice = device;
            document.getElementById('control-title').textContent = `${room} / ${device}`;
            document.getElementById('control-panel').style.display = 'block'; document.getElementById('device-list').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';
            onValue(ref(db, `rooms/${room}/devices/${device}/states`), (snap) => {
                const s = snap.val() || {};
                [1,2,3,4].forEach(i => updateBulb(i, !!s[`bulb${i}`]));
                onValue(ref(db, `rooms/${room}/devices/${device}/states/fanSpeed`), (fsnap) => { updateFan(fsnap.val() ?? 0); });
            });
        };

        window.goBack = () => {
            document.getElementById('control-panel').style.display = 'none'; document.getElementById('device-list').style.display = 'grid';
            document.getElementById('back-btn').style.display = 'none'; window.activeRoom = null; window.activeDevice = null;
        };

        window.toggleBulb = (n) => {
            if (!window.activeRoom) return;
            const el = document.getElementById(`bulb${n}-status`);
            set(ref(db, `rooms/${window.activeRoom}/devices/${window.activeDevice}/states/bulb${n}`), !(el && el.textContent === "ON"));
        };

        window.setFanSpeed = (speed) => {
            if (!window.activeRoom) return;
            set(ref(db, `rooms/${window.activeRoom}/devices/${window.activeDevice}/states/fanSpeed`), speed);
        };

        function updateBulb(n, state) {
            const el = document.getElementById(`bulb${n}-status`); if (!el) return;
            el.textContent = state ? "ON" : "OFF"; el.parentElement.classList.toggle('active', state);
        }

        function updateFan(speed) {
            if (document.getElementById('fan-status')) document.getElementById('fan-status').textContent = `Current: ${['OFF','LOW','MEDIUM','HIGH'][speed]}`;
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('add-device-btn').onclick = () => { document.getElementById('modal').style.display = 'flex'; };
            document.getElementById('close-modal').onclick = () => { document.getElementById('modal').style.display = 'none'; };
        });

        window.addDevice = () => {
            const room = document.getElementById('room-id').value.trim(); const device = document.getElementById('device-id').value.trim();
            if (!room || !device) return;
            push(ref(db, `users/${currentUser.uid}/devices`), { roomId: room, deviceId: device });
            document.getElementById('modal').style.display = 'none';
        };

        // ====================== 🔊 AUDIO TTS ENGINE INTERFACE LAYER ======================
        function jarvisSpeak(text) {
            return new Promise((resolve) => {
                if (!window.speechSynthesis) { resolve(); return; }
                
                if (recognition) { 
                    recognition.onend = null; 
                    recognition.stop(); 
                }
                
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                const selectedLang = document.getElementById('jarvis-lang-select').value;
                
                utterance.lang = selectedLang; 
                utterance.rate = 1.25; // High-speed speaking rate configuration
                utterance.pitch = 1.0;
                
                utterance.onend = () => {
                    if (isAlwaysListening && recognition) { 
                        recognition.onend = () => { if (isAlwaysListening) { try { recognition.start(); } catch(e){} } };
                        setTimeout(() => { try { recognition.start(); } catch(e){} }, 10); // ⚡ Instantly switches back
                    }
                    resolve();
                };
                
                utterance.onerror = () => {
                    if (isAlwaysListening && recognition) { 
                        recognition.onend = () => { if (isAlwaysListening) { try { recognition.start(); } catch(e){} } };
                        setTimeout(() => { try { recognition.start(); } catch(e){} }, 10); 
                    }
                    resolve();
                };
                
                window.speechSynthesis.speak(utterance);
            });
        }

        // ====================== 🔄 ALWAYS ONLINE TOGGLE INTERACTION FUNCTION ======================
        window.toggleAlwaysOnlineListening = () => {
            const onlineBtn = document.getElementById("jarvis-always-online-btn");
            const currentInput = document.getElementById('jarvis-input');

            if (isAlwaysListening) {
                isAlwaysListening = false;
                if (recognition) { 
                    recognition.onend = null; 
                    recognition.onerror = null;
                    recognition.onresult = null;
                    recognition.stop(); 
                }
                onlineBtn.textContent = "Go Always Online";
                onlineBtn.style.background = "linear-gradient(135deg, #0072ff, #00c6ff)";
                currentInput.placeholder = "Ask Jarvis Anything...";
            } else {
                isAlwaysListening = true;
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return;
                
                if (!recognition) { recognition = new SpeechRecognition(); }
                
                // Optimized configuration parameters for high speed
                recognition.continuous = true;
                recognition.interimResults = false;
                recognition.lang = document.getElementById('jarvis-lang-select').value;

                onlineBtn.textContent = "Always Online: ACTIVE";
                onlineBtn.style.background = "#2ecc71"; 
                currentInput.placeholder = "Listening active...";

                recognition.onend = () => { if (isAlwaysListening) { try { recognition.start(); } catch(e){} } };
                recognition.onerror = () => { if (isAlwaysListening) { setTimeout(() => { try { recognition.start(); } catch(e){} }, 10); } };
                
                recognition.onresult = (event) => {
                    const currentResultIndex = event.resultIndex;
                    if (event.results && event.results[currentResultIndex]) {
                        const spokenText = event.results[currentResultIndex][0].transcript.trim();
                        processVoiceMatrix(spokenText);
                    }
                };
                try { recognition.start(); } catch(e) {}
            }
        };

        window.changeJarvisLanguage = () => { if (isAlwaysListening && recognition) { recognition.stop(); } };

        async function processVoiceMatrix(rawText) {
            const norm = rawText.toLowerCase();
            if (rawText.length < 2) return; 
            
            const hasWakeWord = norm.startsWith("hey jarvis") || norm.startsWith("jarvis") || 
                                norm.startsWith("hey jogi") || norm.startsWith("jogi") || 
                                norm.startsWith("hey shree") || norm.startsWith("shree");
            
            if (hasWakeWord) {
                let cleanCommand = norm.replace("hey jarvis","").replace("hey shree","").replace("jarvis","").replace("shree","").replace("hey jogi","").replace("jogi","").trim();
                document.getElementById('jarvis-input').value = rawText;

                if (!cleanCommand) {
                    await jarvisSpeak("Yes, sir.");
                    return;
                }

                // Local Device Matrix Control
                const isOff = cleanCommand.includes("off") || cleanCommand.includes("stop") || cleanCommand.includes("बंद");
                const isOn = cleanCommand.includes("on") || cleanCommand.includes("start") || cleanCommand.includes("चालू");
                
                if ((cleanCommand.includes("bulb") || cleanCommand.includes("light") || cleanCommand.includes("fan") || cleanCommand.includes("पंखा")) && (isOn || isOff)) {
                    let target = userDevicesList[0] || { roomId: "chintubedroom", deviceId: "chintubedroom" };
                    let updates = {};
                    if (cleanCommand.includes("1")) updates["bulb1"] = isOn;
                    else if (cleanCommand.includes("2")) updates["bulb2"] = isOn;
                    else { updates["bulb1"] = isOn; }
                    
                    if (cleanCommand.includes("fan") || cleanCommand.includes("पंखा")) updates["fanSpeed"] = isOn ? 3 : 0;

                    try {
                        await update(ref(db, `rooms/${target.roomId}/devices/${target.deviceId}/states`), updates);
                        await jarvisSpeak("Done.");
                        document.getElementById('jarvis-input').value = "";
                    } catch(e) {}
                    return;
                }

                if (!GLOBAL_SYSTEM_AI_KEY) return;

                // Fast Request Stream Processing Pipeline
                try {
                    const response = await fetch(RENDER_BACKEND_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            command: cleanCommand + " (Respond in 1 short sentence max style)", 
                            key: GLOBAL_SYSTEM_AI_KEY.trim() 
                        })
                    });
                    const data = await response.json();
                    if (data.reply) {
                        await jarvisSpeak(data.reply);
                        document.getElementById('jarvis-input').value = ""; 
                    }
                } catch (err) {}
            }
        }

        window.sendJarvisCommand = () => { processVoiceMatrix("Jarvis " + document.getElementById('jarvis-input').value.trim()); };
        window.toggleJarvisWizard = (show) => {
            document.getElementById('jarvis-panel').style.display = show ? 'block' : 'none';
            document.getElementById('jarvis-orb').style.display = show ? 'none' : 'flex';
        };
        window.activateJarvisWizard = () => { document.getElementById('jarvis-wizard-container').style.display = 'block'; window.toggleJarvisWizard(true); };
        window.turnOffJarvisWizard = () => { document.getElementById('jarvis-wizard-container').style.display = 'none'; if (isAlwaysListening) window.toggleAlwaysOnlineListening(); };
    </script>
    <style>

        .security-lockbox input { flex:1; padding:12px; border:1px solid #ced4da; border-radius:10px; font-size:15px; letter-spacing: 2px; font-weight: bold; background: #ffffff; color: #495057; }

        #add-device-btn { width:auto; padding:14px 30px; display:inline-block; margin-bottom:20px; margin-right:10px; }

        .btn-control { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:12px 30px; border:none; border-radius:12px; cursor:pointer; width:100%; font-weight: bold; }
        #back-btn { background:#6c757d; color:white; padding:10px 20px; border:none; border-radius:8px; color:white; cursor:pointer; margin-bottom:20px; display:none; font-weight: bold; }
        #control-panel { display:none; background:#f8f9fa; padding:30px; border-radius:15px; border: 1px solid #e9ecef; }

        .bulb-card { background:white; border-radius:15px; padding:20px; text-align:center; cursor:pointer; border:2px solid #e9ecef; }
        .bulb-card.active { background:linear-gradient(135deg,#ffd89b,#19547b); color:white; border-color:#ffd89b; }

        .jarvis-wizard-wrapper { position: fixed; bottom: 30px; right: 30px; z-index: 5000; }

        .jarvis-input-group { display: flex; align-items: center; gap: 8px; background: #111a24; padding: 6px 12px; border-radius: 30px; border: 1px solid #34495e; }
        .jarvis-input-group input { flex: 1; background: none; border: none; color: white; padding: 8px 0; font-size: 0.95rem; }
        .jarvis-input-group input:focus { outline: none; }
        .jarvis-always-online-action { display: block; width: 100%; margin-top: 12px; padding: 10px; border: none; border-radius: 12px; background: linear-gradient(135deg, #0072ff, #00c6ff); color: white; font-weight: bold; font-size: 0.85rem; cursor: pointer; text-align: center; }
        @keyframes floatingPulse { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    </style>

<body>
<div class="container">
    <div class="auth-container" id="auth-container">
        <div class="header"><h1>Smart Home</h1></div>
        <div class="form-container" id="login-form">
            <div class="error-message" id="login-error"></div>
            <div class="form-group"><input type="email" id="login-email" placeholder="Email Address"></div>
            <div class="form-group"><input type="password" id="login-password" placeholder="Password"></div>
            <button type="button" class="btn" onclick="login()">Login</button>
            <div class="switch-form"><p>Need an account? <a onclick="showSignup()">Sign up</a></p></div>
        </div>
        <div class="form-container" id="signup-form" style="display:none;">
            <div class="error-message" id="signup-error"></div>
            <div class="form-group"><input type="email" id="signup-email" placeholder="Email Address"></div>
            <div class="form-group"><input type="password" id="signup-password" placeholder="Password"></div>
            <div class="form-group"><input type="password" id="signup-confirm-password" placeholder="Confirm Password"></div>
            <button type="button" class="btn" onclick="signup()">Create Account</button>
            <div class="switch-form"><p>Already registered? <a onclick="showLogin()">Login</a></p></div>
        </div>
    </div>

    <div class="app-container" id="app-container" style="display:none;">
        <div class="app-header">
            <div><h1>Smart Home Control</h1><p>User: <span id="user-name" style="color: #ffd89b;"></span></p></div>
            <button type="button" class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="controls">
            <div class="security-lockbox">
                🔒 Global AI Core: <input type="password" id="dashboard-gemini-key">
                <button type="button" id="unlock-key-btn" onclick="window.unlockKeyField()">Unlock</button>
                <button type="button" id="sync-key-btn" onclick="window.saveSystemKey()">Sync</button>
            </div>
            <button type="button" class="btn" id="add-device-btn">+ Add Node</button>
            <button type="button" id="back-btn" onclick="goBack()">← Back</button>
            <div id="device-list"></div>
            <div id="control-panel">
                <h2 id="control-title">Select device</h2>
                <div class="bulbs-grid">
                    <div class="bulb-card" onclick="toggleBulb(1)"><h3>Bulb 1</h3><div class="status" id="bulb1-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(2)"><h3>Bulb 2</h3><div class="status" id="bulb2-status">OFF</div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h2>Add Target</h2>
        <div class="form-group"><input type="text" id="room-id" placeholder="Room ID"></div>
        <div class="form-group"><input type="text" id="device-id" placeholder="Device ID"></div>
        <button type="button" class="btn" onclick="addDevice()">Connect</button>
        <button type="button" class="btn" style="background:#6c757d;" id="close-modal">Cancel</button>
    </div>
</div>

<div class="jarvis-wizard-wrapper" id="jarvis-wizard-container" style="display:none;">
    <div class="jarvis-orb" id="jarvis-orb" onclick="window.toggleJarvisWizard(true)">🤖</div>
    <div class="jarvis-panel" id="jarvis-panel">
        <div class="jarvis-panel-header">
            <h4>🔵 Jarvis Smart Core</h4>
            <button type="button" style="color:white; background:none; border:none;" onclick="window.toggleJarvisWizard(false)">−</button>
        </div>
        <div class="jarvis-panel-body">
            <div style="margin-bottom: 12px; display: flex; justify-content: space-between; color: #00d2ff; font-size: 0.85rem;">
                <span>🗣️ Language:</span>
                <select id="jarvis-lang-select" onchange="window.changeJarvisLanguage()" style="background: #111a24; color: white; border: 1px solid #34495e;">
                    <option value="en-US">English (US)</option>
                    <option value="hi-IN">Hindi (हिन्दी)</option>
                    <option value="or-IN">Odia (ଓଡ଼ିଆ)</option>
                </select>
            </div>
            <div class="jarvis-input-group">
                <input type="text" id="jarvis-input" placeholder="Listening live...">
            </div>
            <button type="button" class="jarvis-always-online-action" id="jarvis-always-online-btn" onclick="window.toggleAlwaysOnlineListening()">Go Always Online</button>
        </div>
    </div>
</div>
</body>
</html>
