<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home - Multi Room Control</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpq3OMuZetPXgrA3jPb-EacSyJ7hSHGRk",
            authDomain: "homeiotautomanual.firebaseapp.com",
            databaseURL: "https://homeiotautomanual-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "homeiotautomanual",
            storageBucket: "homeiotautomanual.firebasestorage.app",
            messagingSenderId: "672272679550",
            appId: "1:672272679550:web:c94f92fb49f1b7548cce2f",
            measurementId: "G-CTW18729N9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let currentUser = null;
        let userDevicesList = []; 

        // ⚠️ PASTE YOUR GITHUB PERSONAL ACCESS TOKEN (PAT) HERE FOR FREE GPT-4o-MINI POWER
        const GITHUB_FREE_TOKEN = "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";

        window.activeRoom = null;
        window.activeDevice = null;

        // Auth State Tracking
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-name').textContent = user.email.split('@')[0];
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                
                if (localStorage.getItem('jarvis-enabled') !== 'false') {
                    document.getElementById('jarvis-wizard-container').style.display = 'block';
                }
                loadUserDevices();
            } else {
                currentUser = null;
                userDevicesList = [];
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('app-container').style.display = 'none';
                document.getElementById('jarvis-wizard-container').style.display = 'none';
            }
        });

        // Login & Signup Management
        window.login = async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) return showMessage('login-error', 'Please fill in all fields.');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (e) {
                showMessage('login-error', e.message);
            }
        };

        window.signup = async () => {
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm-password').value;
            if (!email || !pass || !confirm) return showMessage('signup-error', 'All fields are required.');
            if (pass !== confirm) return showMessage('signup-error', 'Passwords do not match!');
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, 'users/' + cred.user.uid), { email });
            } catch (e) {
                showMessage('signup-error', e.message);
            }
        };

        window.logout = () => signOut(auth);
        window.showLogin = () => { document.getElementById('login-form').style.display = 'block'; document.getElementById('signup-form').style.display = 'none'; };
        window.showSignup = () => { document.getElementById('login-form').style.display = 'none'; document.getElementById('signup-form').style.display = 'block'; };

        function showMessage(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // Load User Devices from Database
        function loadUserDevices() {
            const devicesRef = ref(db, `users/${currentUser.uid}/devices`);
            onValue(devicesRef, (snapshot) => {
                const data = snapshot.val();
                userDevicesList = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                renderDeviceList(userDevicesList);
            });
        }

        function renderDeviceList(devices) {
            const container = document.getElementById('device-list');
            container.innerHTML = '';
            if (devices.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;font-size:1.2em;grid-column:1/-1;">No devices added yet. Click + to add one!</p>';
                return;
            }
            devices.forEach(dev => {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-header">
                        <h3>${dev.roomId} → ${dev.deviceId}</h3>
                        <div class="online-indicator" id="status-${dev.roomId}-${dev.deviceId}"></div>
                    </div>
                    <button type="button" class="btn-control" onclick="selectDevice('${dev.roomId}', '${dev.deviceId}')">Open Controls</button>
                    <button type="button" class="btn-remove" onclick="removeDevice('${dev.id}')">Remove</button>
                `;
                container.appendChild(card);

                const statusRef = ref(db, `rooms/${dev.roomId}/devices/${dev.deviceId}/online`);
                onValue(statusRef, (snap) => {
                    const indicator = document.getElementById(`status-${dev.roomId}-${dev.deviceId}`);
                    if (indicator) {
                        indicator.className = snap.val() === true ? 'online-indicator online' : 'online-indicator offline';
                    }
                });
            });
        }

        window.selectDevice = (room, device) => {
            window.activeRoom = room;
            window.activeDevice = device;
            document.getElementById('control-title').textContent = `${room} / ${device}`;
            document.getElementById('control-panel').style.display = 'block';
            document.getElementById('device-list').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';
            
            const stateRef = ref(db, `rooms/${room}/devices/${device}/states`);
            onValue(stateRef, (snap) => {
                const s = snap.val() || {};
                [1,2,3,4].forEach(i => updateBulb(i, !!s[`bulb${i}`]));
                updateFan(s.fanSpeed ?? 0);
            });
        };

        window.goBack = () => {
            document.getElementById('control-panel').style.display = 'none';
            document.getElementById('device-list').style.display = 'grid';
            document.getElementById('back-btn').style.display = 'none';
            window.activeRoom = null;
            window.activeDevice = null;
        };

        window.toggleBulb = (n) => {
            if (!window.activeRoom) return alert("Select a device first");
            const current = document.getElementById(`bulb${n}-status`).textContent === "ON";
            set(ref(db, `rooms/${window.activeRoom}/devices/${window.activeDevice}/states/bulb${n}`), !current);
        };

        window.setFanSpeed = (speed) => {
            if (!window.activeRoom) return alert("Select a device first");
            set(ref(db, `rooms/${window.activeRoom}/devices/${window.activeDevice}/states/fanSpeed`), speed);
        };

        function updateBulb(n, state) {
            const el = document.getElementById(`bulb${n}-status`);
            if (!el) return;
            const card = el.parentElement;
            el.textContent = state ? "ON" : "OFF";
            card.classList.toggle('active', state);
        }

        function updateFan(speed) {
            const statusEl = document.getElementById('fan-status');
            if (statusEl) {
                statusEl.textContent = `Current: ${['OFF','LOW','MEDIUM','HIGH'][speed]}`;
            }
            document.querySelectorAll('.speed-btn').forEach((btn, i) => btn.classList.toggle('active', i === speed));
        }

        document.getElementById('add-device-btn').onclick = () => { document.getElementById('modal').style.display = 'flex'; };
        document.getElementById('close-modal').onclick = () => { document.getElementById('modal').style.display = 'none'; };

        window.addDevice = () => {
            const room = document.getElementById('room-id').value.trim();
            const device = document.getElementById('device-id').value.trim();
            if (!room || !device) return alert("Please enter both Room ID and Device ID");
            
            push(ref(db, `users/${currentUser.uid}/devices`), { roomId: room, deviceId: device });
            document.getElementById('room-id').value = '';
            document.getElementById('device-id').value = '';
            document.getElementById('modal').style.display = 'none';
        };

        window.removeDevice = (id) => {
            if (confirm("Remove this device from your list?")) {
                remove(ref(db, `users/${currentUser.uid}/devices/${id}`));
            }
        };

        window.onclick = (e) => {
            const modal = document.getElementById('modal');
            if (e.target === modal) modal.style.display = 'none';
        };

        // ====================== GITHUB MODELS OPENAI VOICE ENGINE CORE ======================
        
        function jarvisSpeak(text) {
            return new Promise((resolve) => {
                if (!window.speechSynthesis) {
                    console.log("Speech synthesis not supported: " + text);
                    resolve();
                    return;
                }
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 1.0; 
                utterance.pitch = 0.95;
                
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                window.speechSynthesis.speak(utterance);
            });
        }

        async function processWithGitHubOpenAI(text) {
            if (!GITHUB_FREE_TOKEN || GITHUB_FREE_TOKEN.includes("YOUR_GITHUB")) {
                console.warn("GitHub PAT Token missing. Dropping to client-side fallback system matrix.");
                return null;
            }

            const currentDeviceContext = JSON.stringify(userDevicesList.map(d => ({ roomId: d.roomId, deviceId: d.deviceId })));
            const now = new Date();
            const liveClockString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " on " + now.toDateString();

            const prompt = `You are Jarvis, a highly advanced general-purpose reasoning assistant like Alexa. Always address the user respectfully as "sir".

Current Date and Clock Time Context: ${liveClockString}
Available Smart Home Hardware Nodes: ${currentDeviceContext}
User Voice/Text Input: "${text}"

Your Instructions:
1. Determine if the user is asking a general conversation query (e.g., "what is the time now", "cricket updates", "how are you", "tell me a joke") or commanding a hardware appliance toggle.
2. If it is a GENERAL KNOWLEDGE / CONVERSATION / TIME ENQUIRY:
   - Set "is_smart_home" to false.
   - Set "needs_clarification" to false.
   - Provide a natural response directly inside "reply_text". Use the context provided above to tell the exact current time if asked. Keep replies concise and ready to be spoken out loud.
3. If it is a SMART HOME COMMAND:
   - Set "is_smart_home" to true.
   - If missing target location context names, set "needs_clarification" to true and ask for the missing details in "reply_text".
   - If complete, map the updates to the "commands" array (actions: "bulb1"-"bulb4" or "fanSpeed" 0-3). Confirm respectfully in "reply_text" (e.g., "Yes sir, setting chintubedroom fan speed to low.").

Return ONLY clean, raw, minified JSON. Do not include markdown codeblocks, backticks, or quotes:
{
  "is_smart_home": false,
  "needs_clarification": false,
  "reply_text": "The current time is exactly 04:15 PM, sir.",
  "commands": []
}`;

            try {
                // Utilizing GitHub's Azure free proxy endpoint for official GPT-4o-mini access
                const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GITHUB_FREE_TOKEN}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini", 
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.3
                    })
                });
                
                const data = await response.json();
                if (!data.choices?.[0]?.message?.content) return null;

                let txt = data.choices[0].message.content.trim();
                const firstBracket = txt.indexOf('{');
                const lastBracket = txt.lastIndexOf('}');
                if (firstBracket === -1 || lastBracket === -1) return null;
                
                return JSON.parse(txt.substring(firstBracket, lastBracket + 1));
            } catch(e) {
                console.error("CORS proxy constraint intercepted, falling back onto local engine matrix safely: ", e);
                return null; 
            }
        }

        // CLIENT-SIDE LOCAL BACKUP MATRIX (Guarantees Alexa replies even without keys or connection)
        function processWithLocalFallback(text) {
            const norm = text.toLowerCase().trim();
            const now = new Date();
            
            if (norm.includes("time") || norm.includes("clock") || norm.includes("what is the time")) {
                const liveTime = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                return {
                    "is_smart_home": false,
                    "needs_clarification": false,
                    "reply_text": `The current time is exactly ${liveTime}, sir.`,
                    "commands": []
                };
            }
            if (norm.includes("cricket") || norm.includes("match") || norm.includes("score")) {
                return {
                    "is_smart_home": false,
                    "needs_clarification": false,
                    "reply_text": "Checking live sports tracking feeds, sir. Matches are currently underway. For ball-by-ball commentary data, please ensure the external sports widget dashboard is fully configured.",
                    "commands": []
                };
            }
            if (norm.includes("how are you")) {
                return {
                    "is_smart_home": false,
                    "needs_clarification": false,
                    "reply_text": "I am functioning at peak operational capacity, sir. Thank you for checking in. How can I assist you with your devices today?",
                    "commands": []
                };
            }
            if (norm.includes("hello") || norm.includes("hi jarvis") || norm.includes("hey jarvis")) {
                return {
                    "is_smart_home": false,
                    "needs_clarification": false,
                    "reply_text": "Hello sir. Central systems are stable. Ready for your next command sequence.",
                    "commands": []
                };
            }
            if (norm.includes("joke")) {
                return {
                    "is_smart_home": false,
                    "needs_clarification": false,
                    "reply_text": "Certainly sir. Why did the smart light bulb fail its school exams? Because it wasn't very bright!",
                    "commands": []
                };
            }

            let targetDevice = userDevicesList[0];
            let foundExplicitly = false;
            for (let dev of userDevicesList) {
                if (norm.includes(dev.roomId.toLowerCase()) || norm.includes(dev.deviceId.toLowerCase())) {
                    targetDevice = dev;
                    foundExplicitly = true;
                    break;
                }
            }

            const isOffAction = norm.includes("off") || norm.includes("stop");
            const isOnAction = norm.includes("on") || norm.includes("start");
            
            if (norm.includes("bulb") || norm.includes("light") || norm.includes("fan")) {
                let targetActions = [];
                let phraseDetail = "";

                if (norm.includes("all") || (norm.includes("bulb") && !/\d/.test(norm))) {
                    targetActions.push({ action: "bulb1", value: isOnAction });
                    targetActions.push({ action: "bulb2", value: isOnAction });
                    targetActions.push({ action: "bulb3", value: isOnAction });
                    targetActions.push({ action: "bulb4", value: isOnAction });
                    phraseDetail = `all bulbs`;
                } else {
                    if (norm.includes("bulb 1") || norm.includes("bulb1")) { targetActions.push({ action: "bulb1", value: isOnAction }); phraseDetail = "bulb 1"; }
                    if (norm.includes("bulb 2") || norm.includes("bulb2")) { targetActions.push({ action: "bulb2", value: isOnAction }); phraseDetail = "bulb 2"; }
                    if (norm.includes("bulb 3") || norm.includes("bulb3")) { targetActions.push({ action: "bulb3", value: isOnAction }); phraseDetail = "bulb 3"; }
                    if (norm.includes("bulb 4") || norm.includes("bulb4")) { targetActions.push({ action: "bulb4", value: isOnAction }); phraseDetail = "bulb 4"; }
                }

                if (norm.includes("fan")) {
                    let fanVal = 0;
                    let speedText = "off";
                    if (isOffAction) { fanVal = 0; speedText = "off"; }
                    else if (norm.includes("low") || norm.includes("speed 1")) { fanVal = 1; speedText = "low"; }
                    else if (norm.includes("medium") || norm.includes("med") || norm.includes("speed 2")) { fanVal = 2; speedText = "medium"; }
                    else if (norm.includes("high") || norm.includes("speed 3")) { fanVal = 3; speedText = "high"; }
                    else if (isOnAction) { fanVal = 1; speedText = "low"; }
                    targetActions.push({ action: "fanSpeed", value: fanVal });
                    phraseDetail = `fan speed to ${speedText}`;
                }

                if (targetActions.length > 0) {
                    return {
                        "is_smart_home": true,
                        "needs_clarification": !foundExplicitly && userDevicesList.length > 1,
                        "reply_text": !foundExplicitly && userDevicesList.length > 1 ? "Which room node should I execute that on, sir?" : `Yes sir, changed ${phraseDetail} successfully.`,
                        "commands": targetActions.map(act => ({
                            room: targetDevice.roomId,
                            device: targetDevice.deviceId,
                            action: act.action,
                            value: act.value
                        }))
                    };
                }
            }

            return {
                "is_smart_home": false,
                "needs_clarification": false,
                "reply_text": "I am online and listening, sir. Let me know if you want to alter a smart appliance state or have a general conversational question.",
                "commands": []
            };
        }

        window.sendJarvisCommand = async () => {
            const input = document.getElementById('jarvis-input');
            const text = input.value.trim();
            if(!text) return;
            
            input.disabled = true;
            input.placeholder = "Jarvis is processing...";

            try {
                let result = await processWithGitHubOpenAI(text);
                if (!result) {
                    result = processWithLocalFallback(text);
                }
                
                if (result) {
                    await jarvisSpeak(result.reply_text);
                    
                    if (result.is_smart_home && result.needs_clarification) {
                        input.value = "";
                        window.startVoiceInput();
                        return;
                    }

                    if (result.is_smart_home && result.commands && result.commands.length > 0) {
                        result.commands.forEach(cmd => {
                            const matchedDevice = userDevicesList.find(d =>
                                d.roomId.toLowerCase().trim() === cmd.room.toLowerCase().trim() && 
                                d.deviceId.toLowerCase().trim() === cmd.device.toLowerCase().trim()
                            );

                            const target = matchedDevice || userDevicesList[0];
                            if (!target) return;

                            if(cmd.action.startsWith('bulb')) {
                                const num = cmd.action.replace('bulb','');
                                set(ref(db, `rooms/${target.roomId}/devices/${target.deviceId}/states/bulb${num}`), !!cmd.value);
                            } else if(cmd.action === 'fanSpeed') {
                                set(ref(db, `rooms/${target.roomId}/devices/${target.deviceId}/states/fanSpeed`), parseInt(cmd.value, 10) || 0);
                            }
                        });
                    }
                    input.value = '';
                }
            } catch (err) {
                console.error(err);
            } finally {
                input.disabled = false;
                input.placeholder = "Ask Jarvis Anything...";
                input.focus();
            }
        };

        window.startVoiceInput = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("Web Speech engine unavailable.");
            
            const recog = new SpeechRecognition();
            recog.lang = 'en-US';
            const micBtn = document.getElementById("jarvis-mic-btn");
            
            recog.onstart = () => {
                micBtn.style.background = "#e74c3c"; 
                document.getElementById('jarvis-input').placeholder = "Listening...";
            };

            recog.onerror = () => { resetMicUI(); };
            recog.onend = () => { resetMicUI(); };
            recog.onresult = e => {
                document.getElementById('jarvis-input').value = e.results[0][0].transcript;
                sendJarvisCommand();
            };

            function resetMicUI() {
                micBtn.style.background = "linear-gradient(135deg,#667eea,#764ba2)";
                document.getElementById('jarvis-input').placeholder = "Ask Jarvis Anything...";
            }
            recog.start();
        };

        // ====================== FLOATING WIZARD CONTROLLER OPERATIONS ======================
        window.toggleJarvisWizard = (expand) => {
            const orb = document.getElementById('jarvis-orb');
            const panel = document.getElementById('jarvis-panel');
            if(expand) {
                orb.style.display = 'none';
                panel.style.display = 'block';
            } else {
                orb.style.display = 'flex';
                panel.style.display = 'none';
            }
        };

        window.turnOffJarvisWizard = () => {
            if(confirm("Do you want to completely shut down and hide the Jarvis window wizard?")) {
                document.getElementById('jarvis-wizard-container').style.display = 'none';
                localStorage.setItem('jarvis-enabled', 'false');
                if(document.getElementById('re-enable-jarvis-btn')) {
                    document.getElementById('re-enable-jarvis-btn').style.display = 'inline-block';
                }
            }
        };

        window.activateJarvisWizard = () => {
            document.getElementById('jarvis-wizard-container').style.display = 'block';
            localStorage.setItem('jarvis-enabled', 'true');
            document.getElementById('re-enable-jarvis-btn').style.display = 'none';
            window.toggleJarvisWizard(true);
        };

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('jarvis-enabled') === 'false') {
                document.getElementById('re-enable-jarvis-btn').style.display = 'inline-block';
            }
            makeWizardDraggable();
        });

        function makeWizardDraggable() {
            const container = document.getElementById("jarvis-wizard-container");
            const header = document.getElementById("jarvis-drag-header");
            const orb = document.getElementById("jarvis-orb");
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            header.onmousedown = dragMouseDown;
            orb.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                container.style.top = (container.offsetTop - pos2) + "px";
                container.style.left = (container.offsetLeft - pos1) + "px";
                container.style.bottom = "auto";
                container.style.right = "auto";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .container { width:100%; max-width:1200px; }
        .auth-container { background:white; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.15); overflow:hidden; max-width:400px; margin:0 auto; }
        .header { background:linear-gradient(135deg,#2c3e50,#34495e); color:white; padding:40px 30px; text-align:center; }
        .header h1 { font-size:2.2em; margin-bottom:8px; }
        .form-container { padding:30px; }
        .form-group { margin-bottom:20px; }
        .form-group input { width:100%; padding:14px; border:2px solid #e9ecef; border-radius:12px; font-size:16px; }
        .btn { width:100%; padding:14px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:12px; font-size:16px; cursor:pointer; }
        .switch-form { margin-top: 15px; text-align: center; font-size: 0.95em; }
        .switch-form a { color:#667eea; cursor:pointer; text-decoration:underline; }
        .error-message { background:#f8d7da; color:#721c24; padding:12px; border-radius:8px; margin-bottom:15px; text-align:center; display:none; }
        .app-container { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; }
        .app-header { background:linear-gradient(135deg,#2c3e50,#34495e); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; }
        .logout-btn { background:#e74c3c; padding:10px 20px; border:none; border-radius:8px; color:white; cursor:pointer; font-weight: bold; }
        .controls { padding:30px; }
        #add-device-btn { width:auto; padding:14px 30px; display:inline-block; margin-bottom:20px; margin-right:10px; }
        #re-enable-jarvis-btn { width:auto; padding:14px 30px; display:none; margin-bottom:20px; background:linear-gradient(135deg, #11998e, #38ef7d); }
        #device-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; margin-top:20px; }
        .room-card { background:#f8f9fa; border-radius:15px; padding:25px; text-align:center; box-shadow:0 8px 25px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        .room-header { margin-bottom:15px; display: flex; justify-content: space-between; align-items: center; }
        .room-header h3 { color:#2c3e50; font-size:1.2em; }
        .online-indicator { width:16px; height:16px; border-radius:50%; background:#e74c3c; }
        .online-indicator.online { background:#2ecc71; box-shadow:0 0 10px #2ecc71; }
        .btn-control { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:12px 30px; border:none; border-radius:12px; cursor:pointer; width:100%; margin:10px 0; font-weight: bold; }
        .btn-remove { background:none; color:#e74c3c; padding:8px 16px; border:1px solid #e74c3c; border-radius:8px; cursor:pointer; font-size:13px; }
        #back-btn { background:#6c757d; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; margin-bottom:20px; display:none; font-weight: bold; }
        #control-panel { display:none; background:#f8f9fa; padding:30px; border-radius:15px; border: 1px solid #e9ecef; }
        #control-title { text-align:center; color:#2c3e50; font-size:1.9em; margin-bottom:20px; }
        .bulbs-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:20px; margin:30px 0; }
        .bulb-card { background:white; border-radius:15px; padding:20px; text-align:center; cursor:pointer; border:2px solid #e9ecef; }
        .bulb-card.active { background:linear-gradient(135deg,#ffd89b,#19547b); color:white; border-color:#ffd89b; }
        .bulb-icon { font-size:2em; margin-bottom:10px; }
        .status { font-weight:bold; font-size:1.2em; margin-top: 5px; }
        .fan-control { background:white; border-radius:15px; padding:30px; text-align:center; margin-top:20px; border: 1px solid #e9ecef; }
        .speed-buttons { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin:20px 0; }
        .speed-btn { padding:14px 32px; border:none; border-radius:30px; background:#e9ecef; color:#495057; font-weight:bold; cursor:pointer; }
        .speed-btn.active { background:linear-gradient(135deg,#667eea,#764ba2); color:white; transform:scale(1.05); }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:2000; }
        .modal-content { background:white; padding:35px; border-radius:15px; width:90%; max-width:420px; text-align:center; }
        
        /* ====================== FLOATING WIZARD COMPONENT CONTAINER STYLES ====================== */
        .jarvis-wizard-wrapper {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 5000;
            display: none;
        }
        .jarvis-orb {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: radial-gradient(circle, #00d2ff 0%, #0066ff 100%);
            box-shadow: 0 8px 32px rgba(0, 102, 255, 0.4), inset 0 0 15px rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: move;
            transition: transform 0.2s ease;
            animation: floatingPulse 2s infinite ease-in-out;
        }
        .jarvis-orb:hover { transform: scale(1.08); }
        .jarvis-panel {
            display: none;
            width: 340px;
            background: rgba(23, 32, 42, 0.96);
            border: 2px solid #00d2ff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .jarvis-panel-header {
            background: linear-gradient(135deg, #1c2833, #2c3e50);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: move;
        }
        .jarvis-panel-header h4 { color: #00d2ff; font-weight: bold; font-size: 1rem; display:flex; align-items:center; gap: 6px;}
        .jarvis-panel-actions { display: flex; gap: 8px; }
        .jarvis-panel-actions button {
            background: none; border: none; color: #bdc3c7; font-size: 1.1rem; cursor: pointer; padding: 2px 6px; border-radius: 4px;
        }
        .jarvis-panel-actions button:hover { color: white; background: rgba(255,255,255,0.1); }
        .jarvis-panel-actions .power-off:hover { color: #e74c3c; }
        .jarvis-panel-body { padding: 15px; }
        .jarvis-input-group {
            display: flex; align-items: center; gap: 8px; background: #111a24; padding: 6px 12px; border-radius: 30px; border: 1px solid #34495e;
        }
        .jarvis-input-group input {
            flex: 1; background: none; border: none; color: white; padding: 8px 0; font-size: 0.95rem;
        }
        .jarvis-input-group input:focus { outline: none; }
        .jarvis-action-btn {
            width: 38px; height: 38px; border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem;
        }
        .mic-btn { background: linear-gradient(135deg,#667eea,#764ba2); }
        .send-btn { background: linear-gradient(135deg,#00c6ff,#0072ff); }

        @keyframes floatingPulse {
            0% { transform: translateY(0px); box-shadow: 0 8px 32px rgba(0, 102, 255, 0.4); }
            50% { transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0, 102, 255, 0.6); }
            100% { transform: translateY(0px); box-shadow: 0 8px 32px rgba(0, 102, 255, 0.4); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="auth-container" id="auth-container">
        <div class="header">
            <h1>Smart Home</h1>
            <p>Multi-Room Control Hub</p>
        </div>
        <div class="form-container" id="login-form">
            <div class="error-message" id="login-error"></div>
            <div class="form-group"><input type="email" id="login-email" placeholder="Email Address"></div>
            <div class="form-group"><input type="password" id="login-password" placeholder="Password"></div>
            <button type="button" class="btn" onclick="login()">Login</button>
            <div class="switch-form"><p>Need an account? <a onclick="showSignup()">Sign up</a></p></div>
        </div>
        <div class="form-container" id="signup-form" style="display:none;">
            <div class="error-message" id="signup-error"></div>
            <div class="form-group"><input type="email" id="signup-email" placeholder="Email Address"></div>
            <div class="form-group"><input type="password" id="signup-password" placeholder="Password"></div>
            <div class="form-group"><input type="password" id="signup-confirm-password" placeholder="Confirm Password"></div>
            <button type="button" class="btn" onclick="signup()">Create Account</button>
            <div class="switch-form"><p>Already registered? <a onclick="showLogin()">Login</a></p></div>
        </div>
    </div>

    <div class="app-container" id="app-container" style="display:none;">
        <div class="app-header">
            <div><h1>Smart Home Control</h1><p>Welcome back, <span id="user-name" style="font-weight: bold; color: #ffd89b;"></span></p></div>
            <button type="button" class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="controls">
            <button type="button" class="btn" id="add-device-btn">+ Add Room & Device Target</button>
            <button type="button" class="btn" id="re-enable-jarvis-btn" onclick="window.activateJarvisWizard()">⚡ Turn On Jarvis Wizard</button>
            <button type="button" id="back-btn" onclick="goBack()">← Back to Device List</button>
            <div id="device-list"></div>
            
            <div id="control-panel">
                <h2 id="control-title">Select a device</h2>
                <div class="bulbs-grid">
                    <div class="bulb-card" onclick="toggleBulb(1)"><div class="bulb-icon">💡</div><h3>Bulb 1</h3><div class="status" id="bulb1-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(2)"><div class="bulb-icon">💡</div><h3>Bulb 2</h3><div class="status" id="bulb2-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(3)"><div class="bulb-icon">💡</div><h3>Bulb 3</h3><div class="status" id="bulb3-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(4)"><div class="bulb-icon">💡</div><h3>Bulb 4</h3><div class="status" id="bulb4-status">OFF</div></div>
                </div>
                <div class="fan-control">
                    <h3>Fan Speed Regulator</h3>
                    <div class="speed-buttons">
                        <button type="button" class="speed-btn" onclick="setFanSpeed(0)">OFF</button>
                        <button type="button" class="speed-btn" onclick="setFanSpeed(1)">LOW</button>
                        <button type="button" class="speed-btn" onclick="setFanSpeed(2)">MED</button>
                        <button type="button" class="speed-btn" onclick="setFanSpeed(3)">HIGH</button>
                    </div>
                    <div class="status" id="fan-status">Current: OFF</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h2>Add New Smart Node</h2>
        <div class="form-group"><input type="text" id="room-id" placeholder="Room ID (e.g., chintubedroom)"></div>
        <div class="form-group"><input type="text" id="device-id" placeholder="Device Node ID (e.g., chintubedroom)"></div>
        <button type="button" class="btn" onclick="addDevice()">Save and Connect</button>
        <button type="button" class="btn" style="background:#6c757d; margin-top:10px;" id="close-modal">Cancel</button>
    </div>
</div>

<div class="jarvis-wizard-wrapper" id="jarvis-wizard-container">
    <div class="jarvis-orb" id="jarvis-orb" onclick="window.toggleJarvisWizard(true)" title="Drag to move / Click to setup commands">🤖</div>
    
    <div class="jarvis-panel" id="jarvis-panel">
        <div class="jarvis-panel-header" id="jarvis-drag-header" title="Drag window layout box">
            <h4>🔵 Jarvis Smart Core</h4>
            <div class="jarvis-panel-actions">
                <button type="button" onclick="window.toggleJarvisWizard(false)" title="Minimize Wizard" style="font-weight: bold;">−</button>
                <button type="button" class="power-off" onclick="window.turnOffJarvisWizard()" title="Completely Turn Off Jarvis Wizard">✕</button>
            </div>
        </div>
        <div class="jarvis-panel-body">
            <div class="jarvis-input-group">
                <input type="text" id="jarvis-input" placeholder="Ask Jarvis Anything...">
                <button type="button" class="jarvis-action-btn mic-btn" id="jarvis-mic-btn" onclick="startVoiceInput()" title="Voice Input">🎤</button>
                <button type="button" class="jarvis-action-btn send-btn" onclick="sendJarvisCommand()" title="Send">➤</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
