<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home - Global Jarvis Core</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpq3OMuZetPXgrA3jPb-EacSyJ7hSHGRk",
            authDomain: "homeiotautomanual.firebaseapp.com",
            databaseURL: "https://homeiotautomanual-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "homeiotautomanual",
            storageBucket: "homeiotautomanual.firebasestorage.app",
            messagingSenderId: "672272679550",
            appId: "1:672272679550:web:c94f92fb49f1b7548cce2f",
            measurementId: "G-CTW18729N9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let currentUser = null;
        let userDevicesList = []; 

        // 🔑 YOUR SECURITY KEY MATRIX LOADED SUCCESSFULLY
        const OPENROUTER_API_KEY = "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";

        window.activeRoom = null;
        window.activeDevice = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-name').textContent = user.email.split('@')[0];
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                if (localStorage.getItem('jarvis-enabled') !== 'false') {
                    document.getElementById('jarvis-wizard-container').style.display = 'block';
                }
                loadUserDevices();
            } else {
                currentUser = null;
                userDevicesList = [];
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('app-container').style.display = 'none';
                document.getElementById('jarvis-wizard-container').style.display = 'none';
            }
        });

        window.login = async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) return showMessage('login-error', 'Please fill in all fields.');
            try { await signInWithEmailAndPassword(auth, email, password); } catch (e) { showMessage('login-error', e.message); }
        };

        window.signup = async () => {
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm-password').value;
            if (!email || !pass || !confirm) return showMessage('signup-error', 'All fields are required.');
            if (pass !== confirm) return showMessage('signup-error', 'Passwords do not match!');
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, 'users/' + cred.user.uid), { email });
            } catch (e) { showMessage('signup-error', e.message); }
        };

        window.logout = () => signOut(auth);
        window.showLogin = () => { document.getElementById('login-form').style.display = 'block'; document.getElementById('signup-form').style.display = 'none'; };
        window.showSignup = () => { document.getElementById('login-form').style.display = 'none'; document.getElementById('signup-form').style.display = 'block'; };

        function showMessage(id, msg) {
            const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function loadUserDevices() {
            const devicesRef = ref(db, `users/${currentUser.uid}/devices`);
            onValue(devicesRef, (snapshot) => {
                const data = snapshot.val();
                userDevicesList = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                renderDeviceList(userDevicesList);
            });
        }

        function renderDeviceList(devices) {
            const container = document.getElementById('device-list'); container.innerHTML = '';
            if (devices.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;font-size:1.2em;grid-column:1/-1;">No devices added yet. Click + to add one!</p>';
                return;
            }
            devices.forEach(dev => {
                const card = document.createElement('div'); card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-header"><h3>${dev.roomId} → ${dev.deviceId}</h3><div class="online-indicator" id="status-${dev.roomId}-${dev.deviceId}"></div></div>
                    <button type="button" class="btn-control" onclick="selectDevice('${dev.roomId}', '${dev.deviceId}')">Open Controls</button>
                    <button type="button" class="btn-remove" onclick="removeDevice('${dev.id}')">Remove</button>
                `;
                container.appendChild(card);
                onValue(ref(db, `rooms/${dev.roomId}/devices/${dev.deviceId}/online`), (snap) => {
                    const indicator = document.getElementById(`status-${dev.roomId}-${dev.deviceId}`);
                    if (indicator) indicator.className = snap.val() === true ? 'online-indicator online' : 'online-indicator offline';
                });
            });
        }

        window.selectDevice = (room, device) => {
            window.activeRoom = room; window.activeDevice = device;
            document.getElementById('control-title').textContent = `${room} / ${device}`;
            document.getElementById('control-panel').style.display = 'block'; document.getElementById('device-list').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';
            onValue(ref(db, `rooms/${room}/devices/${device}/states`), (snap) => {
                const s = snap.val() || {};
                [1,2,3,4].forEach(i => updateBulb(i, !!s[`bulb${i}`]));
                updateFan(s.fanSpeed ?? 0);
            });
        };

        window.goBack = () => {
            document.getElementById('control-panel').style.display = 'none'; document.getElementById('device-list').style.display = 'grid';
            document.getElementById('back-btn').style.display = 'none'; window.activeRoom = null; window.activeDevice = null;
        };

        window.toggleBulb = (n) => {
            if (!window.activeRoom) return alert("Select a device first");
            const el = document.getElementById(`bulb${n}-status`);
            const current = el && el.textContent === "ON";
            set(ref(db, `rooms/${window.activeRoom}/devices/${window.activeDevice}/states/bulb${n}`), !current);
        };

        window.setFanSpeed = (speed) => {
            if (!window.activeRoom) return alert("Select a device first");
            set(ref(db, `rooms/${window.activeRoom}/devices/${window.activeDevice}/states/fanSpeed`), speed);
        };

        function updateBulb(n, state) {
            const el = document.getElementById(`bulb${n}-status`); if (!el) return;
            el.textContent = state ? "ON" : "OFF"; el.parentElement.classList.toggle('active', state);
        }

        function updateFan(speed) {
            const statusEl = document.getElementById('fan-status'); if (statusEl) statusEl.textContent = `Current: ${['OFF','LOW','MEDIUM','HIGH'][speed]}`;
            document.querySelectorAll('.speed-btn').forEach((btn, i) => btn.classList.toggle('active', i === speed));
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('add-device-btn').onclick = () => {
                document.getElementById('modal').style.display = 'flex';
            };
            document.getElementById('close-modal').onclick = () => {
                document.getElementById('modal').style.display = 'none';
            };
        });

        window.addDevice = () => {
            const room = document.getElementById('room-id').value.trim(); const device = document.getElementById('device-id').value.trim();
            if (!room || !device) return alert("Please enter both Room ID and Device ID");
            push(ref(db, `users/${currentUser.uid}/devices`), { roomId: room, deviceId: device });
            document.getElementById('room-id').value = ''; document.getElementById('device-id').value = '';
            document.getElementById('modal').style.display = 'none';
        };

        window.removeDevice = (id) => { if (confirm("Remove this device from your list?")) remove(ref(db, `users/${currentUser.uid}/devices/${id}`)); };

        // ====================== AUDIO SYS ======================
        function jarvisSpeak(text) {
            return new Promise((resolve) => {
                if (!window.speechSynthesis) { resolve(); return; }
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; utterance.rate = 1.0; utterance.pitch = 0.95;
                utterance.onend = () => resolve(); utterance.onerror = () => resolve();
                window.speechSynthesis.speak(utterance);
            });
        }

        // ====================== DIRECT CORE CONTROLLER ======================
        window.sendJarvisCommand = async () => {
            const input = document.getElementById('jarvis-input'); 
            const text = input.value.trim();
            if(!text) return;
            
            input.disabled = true; 
            input.placeholder = "Processing command, sir...";
            
            const norm = text.toLowerCase();

            // Hardware commands checker
            const isOff = norm.includes("off") || norm.includes("stop") || norm.includes("turn off");
            const isOn = norm.includes("on") || norm.includes("start") || norm.includes("turn on");
            
            if ((norm.includes("bulb") || norm.includes("light") || norm.includes("fan")) && (isOn || isOff)) {
                let target = userDevicesList[0] || { roomId: "chintubedroom", deviceId: "chintubedroom" };
                for (let d of userDevicesList) {
                    if (norm.includes(d.roomId.toLowerCase()) || norm.includes(d.deviceId.toLowerCase())) {
                        target = d;
                        break;
                    }
                }

                let updates = {};
                let phraseDetail = "";

                if (norm.includes("all") || (norm.includes("bulb") && !/\d/.test(norm))) {
                    updates["bulb1"] = isOn; updates["bulb2"] = isOn; updates["bulb3"] = isOn; updates["bulb4"] = isOn;
                    phraseDetail = "all appliances";
                } else {
                    if (norm.includes("bulb 1") || norm.includes("bulb1")) { updates["bulb1"] = isOn; phraseDetail = "bulb 1"; }
                    if (norm.includes("bulb 2") || norm.includes("bulb2")) { updates["bulb2"] = isOn; phraseDetail = "bulb 2"; }
                    if (norm.includes("bulb 3") || norm.includes("bulb3")) { updates["bulb3"] = isOn; phraseDetail = "bulb 3"; }
                    if (norm.includes("bulb 4") || norm.includes("bulb4")) { updates["bulb4"] = isOn; phraseDetail = "bulb 4"; }
                }

                if (norm.includes("fan")) {
                    let fanSpeed = 0; let speedText = "off";
                    if (isOff) fanSpeed = 0;
                    else if (norm.includes("low") || norm.includes("speed 1")) { fanSpeed = 1; speedText = "low"; }
                    else if (norm.includes("medium") || norm.includes("med") || norm.includes("speed 2")) { fanSpeed = 2; speedText = "medium"; }
                    else if (norm.includes("high") || norm.includes("speed 3")) { fanSpeed = 3; speedText = "high"; }
                    else if (isOn) { fanSpeed = 1; speedText = "low"; }
                    
                    updates["fanSpeed"] = fanSpeed;
                    phraseDetail = phraseDetail ? "appliances and fan" : `fan speed to ${speedText}`;
                }

                if (Object.keys(updates).length > 0) {
                    try {
                        await update(ref(db, `rooms/${target.roomId}/devices/${target.deviceId}/states`), updates);
                        await jarvisSpeak(`Certainly sir. Adjusting your ${phraseDetail} parameters inside ${target.roomId} now.`);
                        input.value = '';
                    } catch(err) {
                        await jarvisSpeak("Database synchronization failure, sir.");
                    } finally {
                        input.disabled = false; input.placeholder = "Ask Jarvis Anything...";
                    }
                    return;
                }
            }

            // Unrestricted Direct OpenRouter Interface
            if (OPENROUTER_API_KEY === "YOUR_OPENROUTER_KEY_HERE" || !OPENROUTER_API_KEY) {
                await jarvisSpeak("Sir, please verify your OpenRouter key parameter placement on line 31.");
                input.disabled = false; input.placeholder = "Ask Jarvis Anything...";
                return;
            }

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENROUTER_API_KEY.trim()}`
                    },
                   body: JSON.stringify({
                        // 🌟 PASTE THE NEW NVIDIA MODEL ID RIGHT HERE:
                        model: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free", 
                        messages: [
                            { role: "system", content: "You are Jarvis, a highly intelligent smart home assistant. Always address the user respectfully as 'sir'. Keep answers helpful, concise, and natural so they speak out loud easily." },
                            { role: "user", content: text }
                        ]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    console.error("OpenRouter Error:", data.error);
                    await jarvisSpeak(`Sir, OpenRouter reports an error. ${data.error.message || "Please check key parameters."}`);
                    return;
                }

                if (data.choices?.[0]?.message?.content) {
                    const aiReply = data.choices[0].message.content.trim();
                    await jarvisSpeak(aiReply);
                    input.value = '';
                } else {
                    await jarvisSpeak("API data packet structurally empty, sir.");
                }
            } catch (err) {
                console.error(err);
                await jarvisSpeak("Connection parameters offline, sir.");
            } finally { 
                input.disabled = false; input.placeholder = "Ask Jarvis Anything..."; input.focus(); 
            }
        };

        window.startVoiceInput = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("Speech recognition runtime matrix unavailable.");
            const recog = new SpeechRecognition(); recog.lang = 'en-US';
            recog.onstart = () => { document.getElementById("jarvis-mic-btn").style.background = "#e74c3c"; document.getElementById('jarvis-input').placeholder = "Listening..."; };
            recog.onend = () => { document.getElementById("jarvis-mic-btn").style.background = "linear-gradient(135deg,#667eea,#764ba2)"; document.getElementById('jarvis-input').placeholder = "Ask Jarvis Anything..."; };
            recog.onresult = e => { document.getElementById('jarvis-input').value = e.results[0][0].transcript; window.sendJarvisCommand(); };
            recog.start();
        };

        // ====================== WIZARD ENGINE ======================
        window.toggleJarvisWizard = (expand) => {
            document.getElementById('jarvis-orb').style.display = expand ? 'none' : 'flex';
            document.getElementById('jarvis-panel').style.display = expand ? 'block' : 'none';
        };
        window.turnOffJarvisWizard = () => { if(confirm("Hide Jarvis wizard?")) { document.getElementById('jarvis-wizard-container').style.display = 'none'; localStorage.setItem('jarvis-enabled', 'false'); } };
        window.activateJarvisWizard = () => { document.getElementById('jarvis-wizard-container').style.display = 'block'; localStorage.setItem('jarvis-enabled', 'true'); window.toggleJarvisWizard(true); };
        
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("jarvis-wizard-container");
            const header = document.getElementById("jarvis-drag-header"); const orb = document.getElementById("jarvis-orb");
            let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            header.onmousedown = dragMouseDown; orb.onmousedown = dragMouseDown;
            function dragMouseDown(e) { if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return; e.preventDefault(); p3=e.clientX; p4=e.clientY; document.onmouseup=()=> { document.onmouseup=null; document.onmousemove=null; }; document.onmousemove=(ev)=>{ ev.preventDefault(); p1=p3-ev.clientX; p2=p4-ev.clientY; p3=ev.clientX; p4=ev.clientY; container.style.top=(container.offsetTop-p2)+"px"; container.style.left=(container.offsetLeft-p1)+"px"; container.style.bottom="auto"; container.style.right="auto"; }; }
        });
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .container { width:100%; max-width:1200px; }
        .auth-container { background:white; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.15); overflow:hidden; max-width:400px; margin:0 auto; }
        .header { background:linear-gradient(135deg,#2c3e50,#34495e); color:white; padding:40px 30px; text-align:center; }
        .header h1 { font-size:2.2em; margin-bottom:8px; }
        .form-container { padding:30px; }
        .form-group { margin-bottom:20px; }
        .form-group input { width:100%; padding:14px; border:2px solid #e9ecef; border-radius:12px; font-size:16px; }
        .btn { width:100%; padding:14px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:12px; font-size:16px; cursor:pointer; }
        .switch-form { margin-top: 15px; text-align: center; font-size: 0.95em; }
        .switch-form a { color:#667eea; cursor:pointer; text-decoration:underline; }
        .error-message { background:#f8d7da; color:#721c24; padding:12px; border-radius:8px; margin-bottom:15px; text-align:center; display:none; }
        .app-container { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; }
        .app-header { background:linear-gradient(135deg,#2c3e50,#34495e); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; }
        .logout-btn { background:#e74c3c; padding:10px 20px; border:none; border-radius:8px; color:white; cursor:pointer; font-weight: bold; }
        .controls { padding:30px; }
        #add-device-btn { width:auto; padding:14px 30px; display:inline-block; margin-bottom:20px; margin-right:10px; }
        #re-enable-jarvis-btn { width:auto; padding:14px 30px; display:none; margin-bottom:20px; background:linear-gradient(135deg, #11998e, #38ef7d); }
        #device-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; margin-top:20px; }
        .room-card { background:#f8f9fa; border-radius:15px; padding:25px; text-align:center; box-shadow:0 8px 25px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        .room-header { margin-bottom:15px; display: flex; justify-content: space-between; align-items: center; }
        .room-header h3 { color:#2c3e50; font-size:1.2em; }
        .online-indicator { width:16px; height:16px; border-radius:50%; background:#e74c3c; }
        .online-indicator.online { background:#2ecc71; box-shadow:0 0 10px #2ecc71; }
        .btn-control { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:12px 30px; border:none; border-radius:12px; cursor:pointer; width:100%; margin:10px 0; font-weight: bold; }
        .btn-remove { background:none; color:#e74c3c; padding:8px 16px; border:1px solid #e74c3c; border-radius:8px; cursor:pointer; font-size:13px; }
        #back-btn { background:#6c757d; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; margin-bottom:20px; display:none; font-weight: bold; }
        #control-panel { display:none; background:#f8f9fa; padding:30px; border-radius:15px; border: 1px solid #e9ecef; }
        #control-title { text-align:center; color:#2c3e50; font-size:1.9em; margin-bottom:20px; }
        .bulbs-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:20px; margin:30px 0; }
        .bulb-card { background:white; border-radius:15px; padding:20px; text-align:center; cursor:pointer; border:2px solid #e9ecef; }
        .bulb-card.active { background:linear-gradient(135deg,#ffd89b,#19547b); color:white; border-color:#ffd89b; }
        .bulb-icon { font-size:2em; margin-bottom:10px; }
        .status { font-weight:bold; font-size:1.2em; margin-top: 5px; }
        .fan-control { background:white; border-radius:15px; padding:30px; text-align:center; margin-top:20px; border: 1px solid #e9ecef; }
        .speed-buttons { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin:20px 0; }
        .speed-btn { padding:14px 32px; border:none; border-radius:30px; background:#e9ecef; color:#495057; font-weight:bold; cursor:pointer; }
        .speed-btn.active { background:linear-gradient(135deg,#667eea,#764ba2); color:white; transform:scale(1.05); }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:2000; }
        .modal-content { background:white; padding:35px; border-radius:15px; width:90%; max-width:420px; text-align:center; }
        
        .jarvis-wizard-wrapper { position: fixed; bottom: 30px; right: 30px; z-index: 5000; }
        .jarvis-orb { width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle, #00d2ff 0%, #0066ff 100%); box-shadow: 0 8px 32px rgba(0, 102, 255, 0.4), inset 0 0 15px rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: move; transition: transform 0.2s ease; animation: floatingPulse 2s infinite ease-in-out; }
        .jarvis-panel { display: none; width: 340px; background: rgba(23, 32, 42, 0.96); border: 2px solid #00d2ff; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); overflow: hidden; }
        .jarvis-panel-header { background: linear-gradient(135deg, #1c2833, #2c3e50); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: move; }
        .jarvis-panel-header h4 { color: #00d2ff; font-weight: bold; font-size: 1rem; display:flex; align-items:center; gap: 6px;}
        .jarvis-panel-actions { display: flex; gap: 8px; }
        .jarvis-panel-actions button { background: none; border: none; color: #bdc3c7; font-size: 1.1rem; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
        .jarvis-panel-actions .power-off:hover { color: #e74c3c; }
        .jarvis-panel-body { padding: 15px; }
        .jarvis-input-group { display: flex; align-items: center; gap: 8px; background: #111a24; padding: 6px 12px; border-radius: 30px; border: 1px solid #34495e; }
        .jarvis-input-group input { flex: 1; background: none; border: none; color: white; padding: 8px 0; font-size: 0.95rem; }
        .jarvis-input-group input:focus { outline: none; }
        .jarvis-action-btn { width: 38px; height: 38px; border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .mic-btn { background: linear-gradient(135deg,#667eea,#764ba2); }
        .send-btn { background: linear-gradient(135deg,#00c6ff,#0072ff); }
        @keyframes floatingPulse { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>
<div class="container">
    <div class="auth-container" id="auth-container">
        <div class="header"><h1>Smart Home</h1><p>Multi-Room Control Hub</p></div>
        <div class="form-container" id="login-form">
            <div class="error-message" id="login-error"></div>
            <div class="form-group"><input type="email" id="login-email" placeholder="Email Address"></div>
            <div class="form-group"><input type="password" id="login-password" placeholder="Password"></div>
            <button type="button" class="btn" onclick="login()">Login</button>
            <div class="switch-form"><p>Need an account? <a onclick="showSignup()">Sign up</a></p></div>
        </div>
        <div class="form-container" id="signup-form" style="display:none;">
            <div class="error-message" id="signup-error"></div>
            <div class="form-group"><input type="email" id="signup-email" placeholder="Email Address"></div>
            <div class="form-group"><input type="password" id="signup-password" placeholder="Password"></div>
            <div class="form-group"><input type="password" id="signup-confirm-password" placeholder="Confirm Password"></div>
            <button type="button" class="btn" onclick="signup()">Create Account</button>
            <div class="switch-form"><p>Already registered? <a onclick="showLogin()">Login</a></p></div>
        </div>
    </div>

    <div class="app-container" id="app-container" style="display:none;">
        <div class="app-header">
            <div><h1>Smart Home Control</h1><p>Welcome back, <span id="user-name" style="font-weight: bold; color: #ffd89b;"></span></p></div>
            <button type="button" class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="controls">
            <button type="button" class="btn" id="add-device-btn">+ Add Room & Device Target</button>
            <button type="button" class="btn" id="re-enable-jarvis-btn" onclick="window.activateJarvisWizard()">⚡ Turn On Jarvis Wizard</button>
            <button type="button" id="back-btn" onclick="goBack()">← Back to Device List</button>
            <div id="device-list"></div>
            
            <div id="control-panel">
                <h2 id="control-title">Select a device</h2>
                <div class="bulbs-grid">
                    <div class="bulb-card" onclick="toggleBulb(1)"><div class="bulb-icon">💡</div> h3>Bulb 1</h3><div class="status" id="bulb1-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(2)"><div class="bulb-icon">💡</div><h3>Bulb 2</h3><div class="status" id="bulb2-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(3)"><div class="bulb-icon">💡</div><h3>Bulb 3</h3><div class="status" id="bulb3-status">OFF</div></div>
                    <div class="bulb-card" onclick="toggleBulb(4)"><div class="bulb-icon">💡</div><h3>Bulb 4</h3><div class="status" id="bulb4-status">OFF</div></div>
                </div>
                <div class="fan-control">
                    <h3>Fan Speed Regulator</h3>
                    <div class="speed-buttons">
                        <button type="button" class="speed-btn" onclick="setFanSpeed(0)">OFF</button>
                        <button type="button" class="speed-btn" onclick="setFanSpeed(1)">LOW</button>
                        <button type="button" class="speed-btn" onclick="setFanSpeed(2)">MED</button>
                        <button type="button" class="speed-btn" onclick="setFanSpeed(3)">HIGH</button>
                    </div>
                    <div class="status" id="fan-status">Current: OFF</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h2>Add New Smart Node</h2>
        <div class="form-group"><input type="text" id="room-id" placeholder="Room ID (e.g., chintubedroom)"></div>
        <div class="form-group"><input type="text" id="device-id" placeholder="Device Node ID (e.g., chintubedroom)"></div>
        <button type="button" class="btn" onclick="addDevice()">Save and Connect</button>
        <button type="button" class="btn" style="background:#6c757d; margin-top:10px;" id="close-modal">Cancel</button>
    </div>
</div>

<div class="jarvis-wizard-wrapper" id="jarvis-wizard-container" style="display:none;">
    <div class="jarvis-orb" id="jarvis-orb" onclick="window.toggleJarvisWizard(true)">🤖</div>
    <div class="jarvis-panel" id="jarvis-panel">
        <div class="jarvis-panel-header" id="jarvis-drag-header">
            <h4>🔵 Jarvis Smart Core</h4>
            <div class="jarvis-panel-actions">
                <button type="button" onclick="window.toggleJarvisWizard(false)">−</button>
                <button type="button" class="power-off" onclick="window.turnOffJarvisWizard()">✕</button>
            </div>
        </div>
        <div class="jarvis-panel-body">
            <div class="jarvis-input-group">
                <input type="text" id="jarvis-input" placeholder="Ask Jarvis Anything...">
                <button type="button" class="jarvis-action-btn mic-btn" id="jarvis-mic-btn" onclick="startVoiceInput()">🎤</button>
                <button type="button" class="jarvis-action-btn send-btn" onclick="window.sendJarvisCommand()">➤</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
